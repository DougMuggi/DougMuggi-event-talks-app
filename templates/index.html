<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BigQuery Release Notes</title>
  <meta name="description" content="Stay up to date with the latest Google BigQuery release notes, features, fixes, and announcements." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ── Background Orbs ────────────────────────────────────────────── -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- ── Header ────────────────────────────────────────────────────── -->
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="26" height="26">
            <path d="M4 7a3 3 0 0 1 3-3h10a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V7Z" stroke="currentColor" stroke-width="1.6"/>
            <path d="M8 12h8M8 8h5M8 16h3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </span>
        <div class="brand-text">
          <h1>BigQuery <span class="accent">Release Notes</span></h1>
          <p class="brand-sub">Live feed from Google Cloud</p>
        </div>
      </div>

      <div class="header-actions">
        <div id="feed-meta" class="feed-meta" aria-live="polite"></div>
        <button id="refresh-btn" class="btn-refresh" aria-label="Refresh release notes">
          <svg class="spinner-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 12a8 8 0 0 1 8-8V2L12 2a10 10 0 1 0 9.95 9H19.9A8 8 0 0 1 4 12Z" fill="currentColor"/>
          </svg>
          <svg class="refresh-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4v5h5M20 20v-5h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4.05 9A8 8 0 1 1 4 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="btn-label">Refresh</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ── Main Content ───────────────────────────────────────────────── -->
  <main class="main-content">

    <!-- Filter / Search bar -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-ico" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/>
          <path d="m16 16 4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <input id="search-input" type="search" placeholder="Search release notes…" aria-label="Search release notes" />
      </div>
      <div class="filter-pills" id="filter-pills">
        <button class="pill active" data-filter="all">All</button>
        <button class="pill" data-filter="Feature">Feature</button>
        <button class="pill" data-filter="Fix">Fix</button>
        <button class="pill" data-filter="Change">Change</button>
        <button class="pill" data-filter="Deprecation">Deprecation</button>
        <button class="pill" data-filter="Security">Security</button>
        <button class="pill" data-filter="Announcement">Announcement</button>
      </div>
    </div>

    <!-- Status / error banner -->
    <div id="status-banner" class="status-banner hidden" role="alert"></div>

    <!-- Skeleton loader -->
    <div id="skeleton-list" class="skeleton-list" aria-hidden="true">
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
      <div class="skeleton-card"></div>
    </div>

    <!-- Release notes list -->
    <ul id="releases-list" class="releases-list" aria-label="BigQuery release notes"></ul>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">🔍</div>
      <p>No release notes match your filter.</p>
    </div>

  </main>

  <!-- ── Tweet Modal ────────────────────────────────────────────────── -->
  <div id="tweet-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <div class="modal-header">
        <div class="modal-title-row">
          <svg class="x-logo" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
          <h2 id="modal-title">Share on X (Twitter)</h2>
        </div>
        <button id="modal-close" class="modal-close" aria-label="Close tweet modal">×</button>
      </div>

      <label class="tweet-label" for="tweet-text">Tweet preview — edit before sharing:</label>
      <textarea id="tweet-text" class="tweet-textarea" rows="5" maxlength="280" aria-label="Tweet text"></textarea>
      <div class="tweet-footer">
        <span id="char-count" class="char-count">0 / 280</span>
        <div class="modal-actions">
          <button id="modal-cancel" class="btn-secondary">Cancel</button>
          <button id="modal-tweet" class="btn-tweet">
            <svg class="x-logo-sm" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
            Post Tweet
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
